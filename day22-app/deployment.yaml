apiVersion: apps/v1
kind: Deployment
metadata:
  name: day22-demo-api
  namespace: day22-app
  labels:
    app: day22-demo-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: day22-demo-api
  template:
    metadata:
      labels:
        app: day22-demo-api
    spec:
      containers:
      - name: api
        image: acrday22demo.azurecr.io/day22-demo-api:1.0.0
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: APP_VERSION
          value: "1.0.0"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: day22-demo-api
  namespace: day22-app
  labels:
    app: day22-demo-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: day22-demo-api
